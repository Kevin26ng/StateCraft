# Main runtime configuration (Section 10.1)
scenario: pandemic           # 'pandemic' | 'economic' | 'disaster'
num_agents: 6
episode_mode: TRAINING       # 'TRAINING' | 'DEMO' | 'STRESS_TEST'
max_steps:
  TRAINING: 30
  DEMO: 200
  STRESS_TEST: 500
num_episodes: 500
demo_mode: false             # true = sleep(0.5) per step, LLM headlines
reward_clip: 10.0
promotion_threshold: 0.70
promotion_window: 20
initial_tier: 1
memory_backend: json         # 'json' | 'redis'
memory_path: ./data/memory.json
api_host: 0.0.0.0
api_port: 5000
log_level: INFO

# PPO Hyperparameters (Point 4B)
# Defines configuration for long-horizon training
ppo_hyperparameters:
  gamma: 0.95              # Explicit discount factor
  learning_rate: 3e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  clip_range: 0.2
  ent_coef: 0.01

# Optional RL role controller settings.
# When enabled, shallow-DL policy controls the selected RL agents.
rl_agents:
  use_shallow_dl: true
  agent_ids: [agent_0, agent_2, agent_3, agent_4]
  hidden_dim: 64
  device: cpu
  policy_paths: {}

# Optional external LLM socket routing.
# Default split: 2 socket-driven agents (adversarial/political + auditor),
# and 4 shallow-DL RL-controlled agents.
llm_socket_agents:
  enabled: true
  agent_ids: [agent_1, agent_5]
  socket_url: ws://localhost:8001/agents
  timeout_seconds: 1.5
  api_key: null

